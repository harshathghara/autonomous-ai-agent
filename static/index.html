<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autonomous AI Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <header class="sidebar-header">
        <h1>
          <svg class="icon icon-sparkle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5L12 3z"/>
            <path d="M5 3l.6 2.2L7.8 6l-2.2.6L5 8.8 4.2 6.6 2 6l2.2-.6L5 3z"/>
            <path d="M19 14l.6 2.2L21.8 17l-2.2.6L19 19.8l-.6-2.2L16.2 17l2.2-.6L19 14z"/>
          </svg>
          Autonomous AI  Agent
        </h1>
        <p class="muted">Natural language → multi-step tasks</p>
      </header>

      <button type="button" id="new-chat-btn" class="btn-new-chat">+ New chat</button>
      <a class="btn-connect" href="/auth/google">
        <svg class="icon icon-google" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Connect Google
      </a>

      <h2 class="section-label">Chat history</h2>
      <ul id="task-list" class="task-list"></ul>
      <button type="button" id="view-all-btn" class="btn-view-all hidden">View all history</button>
    </aside>

    <main class="main">
      <div id="banner" class="banner hidden" role="status">
        <span class="banner-text"></span>
        <a id="manage-connection" class="banner-action hidden" href="/auth/google">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          Manage connection
        </a>
      </div>

      <section id="steps" class="steps" aria-live="polite"></section>

      <form id="chat-form" class="chat-form">
        <div class="input-card">
          <textarea
            id="prompt"
            rows="3"
            placeholder="Ask the agent… e.g. What meetings do I have next week?"
            required
          ></textarea>
          <div class="form-actions">
            <label class="checkbox" title="Skip approval prompts for email send and calendar create/delete">
              <input type="checkbox" id="auto-approve" checked />
              <span>Auto-approve email &amp; calendar actions</span>
              <svg class="icon icon-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
              </svg>
            </label>
            <button type="submit" id="submit-btn">
              Run
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
              </svg>
            </button>
          </div>
        </div>
      </form>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
